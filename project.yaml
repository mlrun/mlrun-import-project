kind: project
metadata:
  name: stress-project-amite
spec:
  functions:
  - url: jobs_func.py
    name: normal-job-sec
    kind: job
    image: mlrun/mlrun
    handler: func_sec
  - url: jobs_func.py
    name: normal-job-min
    kind: job
    image: mlrun/mlrun
    handler: func_min
  - url: jobs_func.py
    name: normal-job-hour
    kind: job
    image: mlrun/mlrun
    handler: func_hour
  - url: jobs_func.py
    name: artifact-job
    kind: job
    image: mlrun/mlrun
    handler: func_artifact
  - url: jobs_func.py
    name: dataset-job
    kind: job
    image: mlrun/mlrun
    handler: func_dataset
  - url: spark_jobs_func.py
    name: spark-job
    kind: spark
    image: mlrun/mlrun
    handler: spark_handler
  - url: ./dask_jobs_func.py
    name: dask-func
    kind: job
    image: mlrun/mlrun
    handler: train
  - url: nuclio_func.py
    name: nuclio-func
    kind: nuclio
    image: mlrun/mlrun
    handler: handler
  - url: log_models.py
    name: log-models-job
    kind: job
    image: mlrun/mlrun
    handler: log_n_models
    requirements:
    - scikit-learn
  - url: serving_creator_func.py
    name: serving-creator-job
    kind: job
    image: mlrun/mlrun
    handler: deploy_serving_functions
  - url: serving_creator_func_ce.py
    name: serving-creator-job-ce
    kind: job
    image: mlrun/mlrun
    handler: deploy_serving_functions
  - url: prep_data.py
    name: prep-data
    image: mlrun/mlrun
    handler: prep_data
    with_repo: true
  - url: hub://auto-trainer
    name: auto-trainer
  - url: hub://v2-model-server
    name: serve
  - url: hub://describe
    name: describe
  - url: gen_iris.py
    name: gen-iris
    image: mlrun/mlrun
    handler: iris_generator
    requirements:
    - requests
  workflows:
  - path: workflow.py
    name: workflow-func
  artifacts:
  - kind: artifact
    metadata:
      project: pipe
      key: data
    spec:
      target_path: https://s3.wasabisys.com/iguazio/data/iris/iris.data.raw.csv
  conda: ''
  source: ''
  desired_state: online
  build:
    commands: []
    requirements: []
  custom_packagers: []
